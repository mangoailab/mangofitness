<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Coach Dashboard — Mango Fitness</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <main class="container">
    <section class="card hero topbar">
      <div class="hero-main">
        <div class="brand-heading"><div class="brand-mark"><img src="assets/mango-loan-logo.jpg" alt="Mango Fitness" /></div><h1>Coach Dashboard</h1></div>
        <nav class="actions top-actions">
          <a href="index.html" class="nav-link">Home</a>
          <span class="nav-separator">|</span>
          <a href="athlete.html" class="nav-link">Athlete portal</a>
        </nav>
      </div>
      <p class="muted hero-description">Create weekly programs, assign workouts, and review athlete progress.</p>
    </section>

    <section class="card auth-card">
      <h2>Coach Sign In</h2>
      <div class="field"><label for="coachEmail">Email</label><input id="coachEmail" type="email" placeholder="Email" /></div>
      <div class="field"><label for="coachPassword">Password</label><input id="coachPassword" type="password" placeholder="Password" /></div>
      <div class="actions" style="margin-top:14px;">
        <button type="button" class="primary">Sign In</button>
        <button type="button">Forgot Password</button>
      </div>
      <p class="muted" style="margin:12px 0 0;">Program builder coming next.</p>
    </section>
  </main>
</body>
</html>
