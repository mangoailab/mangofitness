<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 653" role="img" aria-labelledby="title desc">
  <title id="title">Mango Fitness logo</title>
  <desc id="desc">Mango wordmark with a green leaf and the word Fitness underneath.</desc>
  <defs>
