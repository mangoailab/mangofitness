<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Progress History — Mango Fitness</title>
  <link rel="stylesheet" href="assets/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/supabase-config.js"></script>
</head>
<body>
  <main class="container">
    <section class="card hero topbar">
      <div class="hero-main">
        <div class="brand-heading"><div class="brand-mark"><img src="assets/mango-fitness-logo.png" alt="Mango Fitness" /></div><h1>Progress History</h1></div>
        <nav class="actions top-actions athlete-nav">
          <a href="index.html" class="nav-link">Home</a>
          <span class="nav-separator">|</span>
          <a href="athlete.html" class="nav-link">Athlete portal</a>
          <span class="nav-separator">|</span>
          <a href="athlete-metrics.html" class="nav-link">Body metrics</a>
          <span class="nav-separator">|</span>
          <a href="athlete-history.html" class="nav-link active" aria-current="page">Progress history</a>
          <span id="historySignOutSeparator" class="nav-separator hidden">|</span>
          <button type="button" id="historySignOutBtn" class="nav-link link-button hidden">Sign out</button>
        </nav>
        <div id="historyHeaderAuth" class="header-auth hidden"><p id="historyDashboardMessage" class="muted"></p></div>
      </div>
      <p class="muted hero-description">Review your own logged workout results.</p>
    </section>

    <section id="historyAuthCard" class="card auth-card">
      <h2>Athlete Sign In</h2>
      <div class="field"><label for="historyEmail">Email</label><input id="historyEmail" type="email" placeholder="Email" /></div>
      <div class="field"><label for="historyPassword">Password</label><input id="historyPassword" type="password" placeholder="Password" /></div>
      <div class="actions" style="margin-top:14px;"><button type="button" id="historySignInBtn" class="primary">Sign In</button><button type="button" id="historyForgotBtn">Forgot Password</button></div>
      <p id="historyAuthMessage" class="muted hidden" style="margin:12px 0 0;"></p>
    </section>

    <section id="historyDashboard" class="dashboard-stack hidden">
      <div class="card dashboard-card">
        <div class="section-head compact"><div><h2>Progress History</h2><p class="muted">Your workout results logged over time.</p></div></div>
        <div class="field narrow-field hidden"><label for="historyProfileSelect">Athlete</label><select id="historyProfileSelect"><option value="">Your account</option></select></div>
        <div id="athleteHistoryList" class="list-stack"></div>
      </div>
    </section>
  </main>
  <script src="assets/auth.js"></script>
  <script src="assets/app.js"></script>
  <script>
    initLoginPage({ emailId:"historyEmail", passwordId:"historyPassword", signInBtnId:"historySignInBtn", forgotBtnId:"historyForgotBtn", signOutBtnId:"historySignOutBtn", authCardId:"historyAuthCard", dashboardId:"historyDashboard", messageId:"historyAuthMessage", dashboardMessageId:"historyDashboardMessage" });
    initAthleteHistoryApp();
  </script>
</body>
</html>
