<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Athlete Portal — Mango Fitness</title>
  <link rel="stylesheet" href="assets/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/supabase-config.js"></script>
</head>
<body>
  <main class="container">
    <section class="card hero topbar">
      <div class="hero-main">
        <div class="brand-heading"><div class="brand-mark"><img src="assets/mango-fitness-logo.png" alt="Mango Fitness" /></div><h1>Athlete Portal</h1></div>
        <nav class="actions top-actions">
          <a href="index.html" class="nav-link">Home</a>
          <span class="nav-separator">|</span>
          <a href="admin.html" class="nav-link">Coach dashboard</a>
          <span class="nav-separator">|</span>
          <a href="athlete-metrics.html" class="nav-link">Body metrics</a>
          <span class="nav-separator">|</span>
          <a href="athlete-history.html" class="nav-link">Progress history</a>
          <span id="athleteSignOutSeparator" class="nav-separator hidden">|</span>
          <button type="button" id="athleteSignOutBtn" class="nav-link link-button hidden">Sign out</button>
        </nav>
        <div id="athleteHeaderAuth" class="header-auth hidden">
          <p id="athleteDashboardMessage" class="muted"></p>
        </div>
      </div>
      <p class="muted hero-description">View today’s workout, enter working weights, log PRs, and track progress.</p>
    </section>

    <section id="athleteAuthCard" class="card auth-card">
      <h2>Athlete Sign In</h2>
      <div class="field"><label for="athleteEmail">Email</label><input id="athleteEmail" type="email" placeholder="Email" /></div>
      <div class="field"><label for="athletePassword">Password</label><input id="athletePassword" type="password" placeholder="Password" /></div>
      <div class="actions" style="margin-top:14px;">
        <button type="button" id="athleteSignInBtn" class="primary">Sign In</button>
        <button type="button" id="athleteForgotBtn">Forgot Password</button>
      </div>
      <p id="athleteAuthMessage" class="muted hidden" style="margin:12px 0 0;"></p>
      <p class="muted" style="margin:12px 0 0;">Sign in to view workouts and log your results.</p>
    </section>

    <section id="athleteDashboard" class="dashboard-stack hidden">
      <div class="card dashboard-card">
        <div class="section-head compact">
          <div>
            <h2>Training Schedule</h2>
            <p id="athleteWeekLabel" class="muted">This week</p>
          </div>
          <span id="athleteWorkoutCount" class="pill">0 workouts</span>
        </div>
        <div class="saved-workout-tools">
          <div class="actions week-actions">
            <button type="button" id="athletePrevWeekBtn">Previous week</button>
            <button type="button" id="athleteThisWeekBtn">This week</button>
            <button type="button" id="athleteNextWeekBtn">Next week</button>
          </div>
          <div class="athlete-filter-grid">
            <div class="field narrow-field"><label for="athleteWorkoutDate">Workout date</label><input id="athleteWorkoutDate" type="date" /></div>
            <div class="field narrow-field"><label for="athleteProfileSelect">View as athlete</label><select id="athleteProfileSelect"><option value="">Everyone / class workouts</option></select></div>
          </div>
        </div>
        <div id="athleteScheduleView" class="workout-calendar"></div>
        <div id="athleteWorkoutView" class="list-stack athlete-detail-stack"></div>
      </div>

    </section>
  </main>
  <script src="assets/auth.js"></script>
  <script src="assets/app.js"></script>
  <script>
    initLoginPage({
      emailId: "athleteEmail",
      passwordId: "athletePassword",
      signInBtnId: "athleteSignInBtn",
      forgotBtnId: "athleteForgotBtn",
      signOutBtnId: "athleteSignOutBtn",
      authCardId: "athleteAuthCard",
      dashboardId: "athleteDashboard",
      messageId: "athleteAuthMessage",
      dashboardMessageId: "athleteDashboardMessage"
    });
    initAthleteApp();
  </script>
</body>
</html>
