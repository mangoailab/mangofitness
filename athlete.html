<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Athlete Portal — Mango Fitness</title>
  <link rel="stylesheet" href="assets/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/supabase-config.js"></script>
</head>
<body>
  <main class="container">
    <section class="card hero topbar">
      <div class="hero-main">
        <div class="brand-heading"><div class="brand-mark"><img src="assets/mango-fitness-logo.png" alt="Mango Fitness" /></div><h1>Athlete Portal</h1></div>
        <nav class="actions top-actions">
          <a href="index.html" class="nav-link">Home</a>
          <span class="nav-separator">|</span>
          <a href="admin.html" class="nav-link">Coach dashboard</a>
        </nav>
      </div>
      <p class="muted hero-description">View today’s workout, enter working weights, log PRs, and track progress.</p>
    </section>

    <section id="athleteAuthCard" class="card auth-card">
      <h2>Athlete Sign In</h2>
      <div class="field"><label for="athleteEmail">Email</label><input id="athleteEmail" type="email" placeholder="Email" /></div>
      <div class="field"><label for="athletePassword">Password</label><input id="athletePassword" type="password" placeholder="Password" /></div>
      <div class="actions" style="margin-top:14px;">
        <button type="button" id="athleteSignInBtn" class="primary">Sign In</button>
        <button type="button" id="athleteForgotBtn">Forgot Password</button>
      </div>
      <p id="athleteAuthMessage" class="muted hidden" style="margin:12px 0 0;"></p>
      <p class="muted" style="margin:12px 0 0;">Daily workout view coming next.</p>
    </section>

    <section id="athleteDashboard" class="card auth-card hidden">
      <h2>Athlete Portal</h2>
      <p id="athleteDashboardMessage" class="muted"></p>
      <p class="muted">Supabase is connected. Daily workout view coming next.</p>
      <div class="actions" style="margin-top:14px;"><button type="button" id="athleteSignOutBtn">Sign out</button></div>
    </section>
  </main>
  <script src="assets/auth.js"></script>
  <script>
    initLoginPage({
      emailId: "athleteEmail",
      passwordId: "athletePassword",
      signInBtnId: "athleteSignInBtn",
      forgotBtnId: "athleteForgotBtn",
      signOutBtnId: "athleteSignOutBtn",
      authCardId: "athleteAuthCard",
      dashboardId: "athleteDashboard",
      messageId: "athleteAuthMessage",
      dashboardMessageId: "athleteDashboardMessage"
    });
  </script>
</body>
</html>
