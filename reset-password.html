<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Reset Password — Mango Fitness</title>
  <link rel="stylesheet" href="assets/styles.css?v=20260523-home-cache" />
  <link rel="manifest" href="manifest.webmanifest?v=20260523-home-cache" />
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png" />
  <meta name="theme-color" content="#f59e0b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Mango Fitness" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/supabase-config.js"></script>
</head>
<body>
  <main class="container">
    <section class="card auth-card">
      <h2>Reset Password</h2>
      <p class="muted">Enter a new password for your Mango Fitness account.</p>
      <div class="field"><label for="newPassword">New Password</label><input id="newPassword" type="password" placeholder="New password" /></div>
      <div class="field"><label for="confirmPassword">Confirm Password</label><input id="confirmPassword" type="password" placeholder="Confirm password" /></div>
      <div class="actions" style="margin-top:14px;">
        <button type="button" id="savePasswordBtn" class="primary">Save Password</button>
        <button type="button" onclick="window.history.length > 1 ? window.history.back() : window.location.href='index.html'">Back</button>
      </div>
      <p id="resetMessage" class="muted hidden" style="margin:12px 0 0;"></p>
    </section>
  </main>
  <script src="assets/auth.js"></script>
  <script>initResetPasswordPage();</script>
</body>
</html>
